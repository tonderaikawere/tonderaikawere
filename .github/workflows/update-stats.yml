name: Update GitHub Stats

on:
  schedule:
    # Runs every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allows manual run

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        
      - name: Update README with latest follower/following counts
        run: |
          FOLLOWERS=$(curl -s "https://api.github.com/users/tonderaikawere" | jq '.followers')
          FOLLOWING=$(curl -s "https://api.github.com/users/tonderaikawere" | jq '.following')
          
          # Update the shields.io badges - they auto-refresh from GitHub API
          echo "Followers: $FOLLOWERS, Following: $FOLLOWING"
          
      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: update stats [skip ci]"
          git push
